# *.hamrotourist.com — Tenant Agency Websites (port 3001)
# Catch-all: handles all other subdomains + custom domains
# Cloudflare Worker injects X-Tenant-Slug before reaching here

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/ssl/cloudflare/hamrotourist.pem;
    ssl_certificate_key /etc/ssl/cloudflare/hamrotourist.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    real_ip_header CF-Connecting-IP;
    client_max_body_size 20M;
    proxy_read_timeout 60s;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Tenant-Slug $http_x_tenant_slug;
        proxy_cache_bypass $http_upgrade;
    }
}
