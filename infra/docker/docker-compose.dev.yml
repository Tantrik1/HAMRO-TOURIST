version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hamrotourist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hamrotourist
      POSTGRES_PASSWORD: hamrotourist_dev
      POSTGRES_DB: hamrotourist
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hamrotourist"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hamrotourist-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
