  crm-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: crm-service
        SERVICE_PORT: 4007
    image: hamrotourist/crm-service:latest
    ports:
