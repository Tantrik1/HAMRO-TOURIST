version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data

  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    env_file: ../../.env
    depends_on:
      - postgres
      - redis

  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    env_file: ../../.env
    depends_on:
      - postgres

  tenant-service:
    build:
      context: ../../
      dockerfile: services/tenant-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    env_file: ../../.env
    depends_on:
      - postgres

volumes:
  postgres-data:
  redis-data:
