      args:
        SERVICE_NAME: tenant-service
        SERVICE_PORT: 4002
    image: hamrotourist/tenant-service:latest
    ports:
      - "127.0.0.1:4002:4002"
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
