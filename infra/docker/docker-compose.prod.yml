      context: ../../
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: website-builder-service
        SERVICE_PORT: 4004
    image: hamrotourist/website-builder-service:latest
    ports:
      - "127.0.0.1:4004:4004"
