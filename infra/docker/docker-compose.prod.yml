# ============================================================
# NEXT.JS FRONTEND APPS
# ============================================================
  admin-frontend:
    <<: *nextjs-defaults
    build:
      context: ../../
      dockerfile: Dockerfile.app
      args:
        APP_NAME: admin-frontend
        APP_PORT: 3000
        NEXT_PUBLIC_API_URL: https://api.hamrotourist.com
        NEXT_PUBLIC_RENDERER_URL: https://app.hamrotourist.com
    image: hamrotourist/admin-frontend:latest
    ports:
      - "127.0.0.1:3000:3000"

  marketing-site:
    <<: *nextjs-defaults
    build:
      context: ../../
      dockerfile: Dockerfile.app
      args:
        APP_NAME: marketing-site
        APP_PORT: 3002
        NEXT_PUBLIC_API_URL: https://api.hamrotourist.com
    image: hamrotourist/marketing-site:latest
    ports:
      - "127.0.0.1:3002:3002"
