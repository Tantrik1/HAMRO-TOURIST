
networks:
  hamrotourist:
    driver: bridge

volumes:
  redis-data:

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks: [hamrotourist]
  env_file: ../../.env
  environment:
    # Override localhost values from .env with docker service names
    DATABASE_HOST: postgres
    DB_HOST: postgres
    DB_USER: hamrotourist
    DB_PASSWORD: 428493e3b14ffe9feace7e3ab6a62c1df0a23559
    DB_NAME: hamrotourist
    DB_PORT: 5432
    REDIS_URL: redis://redis:6379
    REDIS_HOST: redis
    REDIS_PORT: 6379
    # Inter-service URLs (docker DNS service names). Any service that needs
    # to call another should resolve via these envs, never via localhost.
    AUTH_SERVICE_URL: http://auth-service:4001
    TENANT_SERVICE_URL: http://tenant-service:4002
    PRODUCT_SERVICE_URL: http://product-service:4003
    WEBSITE_BUILDER_SERVICE_URL: http://website-builder-service:4004
    MEDIA_SERVICE_URL: http://media-service:4005
    DOMAIN_SERVICE_URL: http://domain-service:4006
    CRM_SERVICE_URL: http://crm-service:4007
    NOTIFICATION_SERVICE_URL: http://notification-service:4008
    BILLING_SERVICE_URL: http://billing-service:4009
    BOOKING_SERVICE_URL: http://booking-service:4010
    # Stripe keys (placeholders for dev; replace with real keys in production)
    STRIPE_SECRET_KEY: sk_test_placeholder_key_for_dev
    STRIPE_PRO_PRICE_ID: price_pro_placeholder
    STRIPE_BUSINESS_PRICE_ID: price_business_placeholder
    STRIPE_ENTERPRISE_PRICE_ID: price_enterprise_placeholder

x-nextjs-defaults: &nextjs-defaults
  restart: unless-stopped
  networks: [hamrotourist]
  env_file: ../../.env

# ============================================================
# INFRASTRUCTURE
# ============================================================
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [hamrotourist]
    environment:
      POSTGRES_USER: hamrotourist
      POSTGRES_PASSWORD: 428493e3b14ffe9feace7e3ab6a62c1df0a23559
      POSTGRES_DB: hamrotourist
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hamrotourist"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [hamrotourist]
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# NESTJS MICROSERVICES
# ============================================================
  api-gateway:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
        SERVICE_PORT: 4000
    image: hamrotourist/api-gateway:latest
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      DATABASE_HOST: postgres
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:4001
      TENANT_SERVICE_URL: http://tenant-service:4002
      PRODUCT_SERVICE_URL: http://product-service:4003
      WEBSITE_BUILDER_SERVICE_URL: http://website-builder-service:4004
      MEDIA_SERVICE_URL: http://media-service:4005
      DOMAIN_SERVICE_URL: http://domain-service:4006
      CRM_SERVICE_URL: http://crm-service:4007
      NOTIFICATION_SERVICE_URL: http://notification-service:4008
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  auth-service:
    <<: *service-defaults
    build:
      context: ../../
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: 4001
    image: hamrotourist/auth-service:latest
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      postgres:
        condition: service_healthy

  tenant-service:
